<title>Technical Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#1e293b;font-family:system-ui,-apple-system,sans-serif;padding:16px 20px;max-width:780px;margin:0 auto;min-height:100vh}
button{font-family:inherit}
h1{font-size:20px;font-weight:700}
.sub{color:#6b7280;font-size:11px;margin:2px 0 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.header-right{display:flex;align-items:center;gap:12px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:8px;top:7px;color:#6b7280}
.search-wrap input{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:5px 10px 5px 28px;color:#1e293b;font-size:12px;width:140px;outline:none}
.row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.pill{border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;transition:all 0.12s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b}
.pill.active{background:var(--ac,#f97316)22;border-color:var(--ac,#f97316)66;color:var(--ac,#f97316)}
.pill .cnt{font-size:9px;opacity:0.5}
.pill .co-period{font-size:10px;opacity:0.6}
.pill .co-name{font-weight:600}
.toggle-btn{background:none;border:1px solid #e2e8f0;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.toggle-btn.on{color:#f97316;border-color:rgba(249,115,22,0.3)}
.toggle-btn.off{color:#6b7280}
.clear-btn{background:none;border:none;color:#f97316;font-size:11px;cursor:pointer;padding:4px 6px;display:flex;align-items:center;gap:3px}
.cat-header{background:none;border:none;color:#6b7280;font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.cat-header .desc{font-weight:400;font-size:10px;opacity:0.6;text-transform:none}
.cat-header .ac-count{color:#f97316;font-size:10px;font-weight:400}
.cat-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:12px}
.filter-row .count{font-size:11px;color:#6b7280}
.active-tags{display:flex;gap:3px;flex-wrap:wrap}
.active-tag{font-size:10px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;cursor:pointer}
.cards{display:flex;flex-direction:column;gap:4px}
.card{border-radius:8px;padding:8px 12px;transition:all 0.12s;border:1px solid #e2e8f0;background:#fafbfc}
.card.open{background:#fff7ed;border-color:rgba(249,115,22,0.3)}
.card-head{cursor:pointer;display:flex;align-items:center;gap:8px}
.card-co{font-size:10px;font-weight:700;min-width:26px}
.card-id{color:#6b7280;font-size:10px;font-weight:600;min-width:40px;font-family:monospace}
.card-title{font-size:13px;font-weight:600;flex:1}
.card-period{font-size:10px;color:#94a3b8;min-width:50px;text-align:right}
.card-icons{display:flex;gap:2px}
.card-icons svg{width:12px;height:12px}
.card-body{margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0}
.card-body p{font-size:13px;color:#475569;line-height:1.55;margin:0 0 8px}
.card-body .tech-line{font-size:12px;color:#64748b;font-family:'SF Mono',SFMono-Regular,Consolas,monospace;background:#f1f5f9;padding:4px 8px;border-radius:4px;margin:0 0 8px;line-height:1.5}
.card-body .no-full{font-size:11px;color:#94a3b8;font-style:italic;margin:0 0 8px}
.card-links{display:flex;gap:4px;flex-wrap:wrap;margin:0 0 6px}
.card-link{font-size:10px;padding:2px 8px;border-radius:4px;background:#eff6ff;color:#3b82f6;text-decoration:none;display:inline-flex;align-items:center;gap:3px;border:1px solid #bfdbfe}
.card-link:hover{background:#dbeafe}
.card-rel{font-size:10px;color:#f97316;margin:0 0 6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.card-rel span{background:rgba(249,115,22,0.1);padding:1px 6px;border-radius:3px}
.tag-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px;align-items:center}
.tag-row .cat-label{font-size:9px;color:#94a3b8;min-width:55px;text-transform:uppercase}
.mini-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:3px;background:#f1f5f9;color:#64748b;cursor:pointer}
.mini-tag.active{color:var(--ac);background:var(--ac-bg)}
.popover{position:fixed;background:#fff;border:1px solid #f97316;border-radius:8px;padding:12px 16px;z-index:9999;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,0.12);opacity:0;transition:opacity 0.15s;max-height:60vh;overflow-y:auto}
.popover.visible{opacity:1}
.popover .pop-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.popover .pop-co{font-size:10px;font-weight:700}
.popover .pop-id{color:#f97316;font-weight:700;font-size:14px}
.popover .pop-title{color:#1e293b;font-size:13px;font-weight:600}
.popover .pop-text{color:#475569;font-size:12px;line-height:1.6}
.popover .pop-tech{font-size:11px;color:#64748b;font-family:'SF Mono',SFMono-Regular,Consolas,monospace;background:#f1f5f9;padding:3px 6px;border-radius:3px;margin-top:6px;line-height:1.5}
.popover .pop-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.popover .pop-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:3px}
.arc{margin-top:24px;border-top:1px solid #e2e8f0;padding-top:16px}
.arc-header{background:none;border:none;color:#f97316;font-size:14px;font-weight:700;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px}
.arc-header .a-sub{font-size:11px;font-weight:400;color:#6b7280}
.a-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.a-card{background:#fafbfc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;position:relative}
.a-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:6px 0 0 6px;background:var(--ac,#f97316)}
.a-card .a-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.a-card .a-num{color:var(--ac,#f97316);font-size:16px;font-weight:400;min-width:20px}
.a-card .a-name{color:var(--ac,#f97316);font-weight:700;font-size:14px}
.a-card .a-period{font-size:11px;color:#94a3b8;margin-left:auto}
.a-card .a-short{color:#475569;font-size:13px;margin:0 0 6px;padding-left:28px}
.a-chain{padding-left:28px;display:flex;flex-direction:column;gap:4px}
.chain-step{display:flex;align-items:baseline;gap:6px;font-size:12px}
.chain-arrow{color:var(--ac);font-weight:700;font-size:14px;flex-shrink:0}
.chain-step .a-story-link{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(249,115,22,0.12);color:#f97316;cursor:pointer;flex-shrink:0}
.chain-note{color:#64748b;font-size:12px;line-height:1.4}
.empty{color:#94a3b8;font-size:13px;text-align:center;padding:20px}
svg.i{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
svg.i14{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
svg.i16{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
svg.i9{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
svg.i11{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card-title svg.i11{stroke:#eab308;fill:#eab308}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;margin-bottom:8px;scrollbar-width:thin}
.gallery::-webkit-scrollbar{height:4px}
.gallery::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
.gal-card{flex-shrink:0;width:180px;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;background:#fafbfc;cursor:pointer;transition:all 0.15s}
.gal-card:hover{border-color:rgba(249,115,22,0.4);box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.gal-card img{width:100%;height:101px;object-fit:cover;display:block;background:#f1f5f9}
.gal-card .gal-site{width:100%;height:101px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8fafc,#f1f5f9);font-size:16px;font-weight:700;color:#64748b;letter-spacing:0.5px}
.gal-card .gal-info{padding:5px 8px}
.gal-card .gal-id{font-size:9px;color:#94a3b8;font-family:monospace}
.gal-card .gal-name{font-size:11px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inline-thumb{margin:0 0 8px;display:flex;gap:6px;flex-wrap:wrap}
.inline-thumb a{display:block;border-radius:6px;overflow:hidden;border:1px solid #e2e8f0;transition:all 0.15s}
.inline-thumb a:hover{border-color:rgba(249,115,22,0.4)}
.inline-thumb img{height:80px;width:auto;display:block;background:#f1f5f9}
</style>

  {id:"S01",t:"vram.run",co:"IND",per:"Feb 2026",tags:["Tools/Infra","Side Project"],tech:"Rust, TypeScript, HF Inference API \xb7 19 providers, 220+ HW configs, 30+ cloud GPUs",sum:"Search a model: see which API providers serve it, which GPUs can run it locally (and how fast), and what cloud rental would cost. Or search your hardware and see what fits. Also a Rust CLI.",links:[{l:"Site",u:"https://vram.run"},{l:"CLI",u:"https://github.com/jadnohra/hf-providers"}]},
  {id:"S02",t:"Psychotron",co:"IND",per:"Feb 2026",tags:["Audio/DSP","Graphics","Side Project"],tech:"JavaScript, Web Audio API, AudioWorklet, Canvas 2D \xb7 Pitch-shifting, 12-voice chorus, flanger, 13-band EQ, convolver reverb",sum:"Front-end for flash fiction audiobook. Web Audio DSP chain with AudioWorklet pitch-shifting, 12-voice chorus, flanger, 13-band EQ, and convolver reverb. 2D canvas effect morphing engine. Synchronized teleprompter.",links:[{l:"Site",u:"https://psychotron.ai/"}]},
  {id:"S03",t:"RecentWork",co:"IND",per:"Feb 2026",tags:["Tools/Infra","Side Project"],tech:"Swift, macOS, FSEvents, launchd \xb7 File system daemon, Homebrew installable",sum:"macOS daemon that watches project directories and maintains ~/RecentWork/ as a flat folder of symlinks to recently modified files. Homebrew installable.",links:[{l:"GitHub",u:"https://github.com/jadnohra/recent-work"}]},

  {id:"S08",t:"Learn Rust Course",co:"IND",per:"Feb 2026",tags:["Compilers","Side Project"],tech:"Rust \xb7 Memory model for C++ programmers",sum:"Course: Rust\u2019s memory model for C++ programmers. Written from experience of transitioning from C++ to Rust at Irreducible.",links:[{l:"Site",u:"https://notes.jadnohra.com/learn-rust/"},{l:"GitHub",u:"https://github.com/jadnohra/learn-rust"}]},
  {id:"T01",t:"Three-Mode Architecture",co:"IRR",per:"2024\u201325",top:1,star:1,tags:["ZK/Crypto","FPGA/HW","Architecture","R&D"],tech:"Rust, Verilator, FPGA (Xilinx) \xb7 Emulated/verilated/HW unified API, hardware-software co-design",sum:"Designed unified device abstraction across emulated (CPU), verilated (RTL simulation), and FPGA hardware. Implemented emulated mode; led architecture for verilated and FPGA modes. Single codebase enabling algorithm dev on CPU, cycle-accurate validation on Verilator, deployment on FPGA.",full:"Diagnosed that the company had rebuilt the product 3\u00d7 with the same failure pattern: crypto design \u2192 handed to HW \u2192 implemented \u2192 performance not where expected. Proposed three implementations of the systems layer with different use cases, all implementing the same interface. Challenged by founders as unnecessary but not blocked. Contrasting sim vs verilated found implementation bugs. Verilated vs HW found HW bugs. Simulation became powerful enough to estimate future performance quickly.",links:[],rel:["IRR-12"]},
  {id:"T02",t:"XLang Compiler",co:"IRR",per:"2024\u201325",top:1,tags:["Compilers","ZK/Crypto","FPGA/HW","R&D"],tech:"Rust \xb7 DAG computation graph, instruction scheduling, register allocation, VLIW codegen, greedy coloring",sum:"Led development of domain-specific language and compiler for xcheck accelerator. Computation graph construction (DAG). Compiler pipeline: detriangulation \u2192 instruction scheduling \u2192 register allocation \u2192 VLIW code generation. Register bank allocation with coloring. ALU/LSU instruction encoding. Emulator for validation.",full:"Noticed a crypto team member had built bespoke tooling at the interface intersection. Proposed a backend-only compiler (xlang). Moved developer to my team. Hired compiler engineer after removing Rust expertise JD constraint. Greedy algorithm generalizing existing approaches \u2014 handles 80%+ of code optimally. FPGA cores were VLIW-like with quirks, not Turing complete, like crypto DSPs with multi-register bank constraints.",links:[],rel:["IRR-6","IRR-8"]},
  {id:"T03",t:"ZK Compute Kernels",co:"IRR",per:"2024\u201325",tags:["ZK/Crypto","FPGA/HW","Optimization","Shipped"],tech:"Rust \xb7 NTT, FRI fold, tensor expand, inner products, extrapolate line, sum composition evals",sum:"Core compute kernels for zero-knowledge proof acceleration: Number-Theoretic Transform, FRI fold operations, tensor expand/operations, inner products, extrapolate line, sum composition evaluations. Memory stress testing.",links:[]},
  {id:"T04",t:"FPGA Device Management",co:"IRR",per:"2024\u201325",tags:["FPGA/HW","Tools/Infra","Shipped"],tech:"Rust, Linux \xb7 VFIO driver binding, DMA memory mgmt, PCIe config, H2C/C2H transfer, IOMMU",sum:"FPGA bitstream programming, VFIO driver binding, DMA memory management, PCIe device configuration. Host-to-card and card-to-host data transfer. Register-level hardware control. AWS S3 bitstream distribution. Memory frame allocation, task graph scheduling. IOMMU integration.",links:[],rel:["IRR-9"]},
  {id:"T05",t:"Binius Integration",co:"IRR",per:"2024\u201325",tags:["ZK/Crypto","FPGA/HW","Optimization","R&D"],tech:"Rust \xb7 Finite fields over binary fields, polynomial commitments, multi-linear extensions",sum:"Hardware acceleration for Binius zero-knowledge proof system. Finite field operations over binary fields. Polynomial commitment schemes. Multi-linear extensions.",links:[{l:"Binius",u:"https://github.com/IrreducibleOSS/binius"}]},
  {id:"T06",t:"Hazard Zone Model (HZM)",co:"FER",per:"2023\u201324",top:1,star:1,tags:["AV/Safety","Perception","DSP/Signals","Shipped"],tech:"C++, ROS2 \xb7 Swept-path analysis, kinematic modeling, uncertainty propagation, ground segmentation",sum:"Comprehensive safety specification expanding perceived area with all potential noise sources \u2014 LiDAR calibration, weather effects, uncertainty of future driver action. Articulated truck-trailer kinematic modeling for trajectory prediction under steering uncertainty, integrated as swept-path analysis noise source.",full:"Paper-to-production prototype \u2014 adapted academic ground segmentation algorithm, hardware bring-up. Rewrote pipeline for resource-constrained certifiable embedded platform. Open-loop function with single decision: stop or not. Central to safety design and certification.",links:[{l:"Video",u:"https://youtu.be/O8ogbux_308"}],rel:["FER-4"]},
  {id:"T07",t:"Safety Perception Pipeline",co:"FER",per:"2023\u201324",top:1,tags:["Perception","AV/Safety","DSP/Signals","Shipped"],tech:"C++, ROS2, LiDAR, Radar \xb7 Ground plane segmentation (zero false negatives), dual-sensor fusion",sum:"LiDAR-based ground plane segmentation with zero false negatives requirement. Dual-sensor approach (radar + LiDAR) for weather robustness. Validated in Estonian winter operations \u2014 snow-covered ground detection, heavy rain with zero false positives/negatives.",full:"2 weeks deep research concluded viability. Built working end-to-end prototype in 1 month with 2 devs. Found paper with code to modify. Soldered wires for missing connectors. Apple Demo: threw apple in front of truck, stopped with very high precision. Rain demo: heavy rain, no false positives or negatives.",links:[{l:"Video",u:"https://youtu.be/O8ogbux_308"}],rel:["FER-2","FER-3"]},
  {id:"T08",t:"Safety Case Design (T\u00dcV S\u00dcD)",co:"FER",per:"2023\u201324",top:1,tags:["AV/Safety","Architecture","Shipped"],tech:"DFD diagrams \xb7 Design-close-to-code, provable output statements, SOTIF, functional safety",sum:"Developed DFD-based approach keeping design close to code with provable statements about output relations. Contributed to T\u00dcV S\u00dcD certification. Challenged systems engineering requirements \u2014 many changes made.",links:[],rel:["FER-12","FER-13"]},
  {id:"T09",t:"Function Testing Framework",co:"FER",per:"2023\u201324",tags:["AV/Safety","Tools/Infra","Prototype"],tech:"C++, Python \xb7 Replay-based testing, open-loop ground truth labeling, scenario database",sum:"Scenario/test database for systematic validation of open-loop safety decisions. Replay-based testing using recorded drive data with labeled ground truth.",links:[],rel:["FER-5"]},
  {id:"T10",t:"Trailer Angle Detection",co:"FER",per:"2023\u201324",tags:["Perception","AV/Safety","DSP/Signals","Prototype"],tech:"C++, ROS2 \xb7 Geometric projection, cosine fitting, image processing on point clouds",sum:"Discovered trailer needed HZM inclusion. Applied image processing: geometric projection and cosine fitting. Made it to product but had calibration shortcomings. Later hire improved with more robust techniques.",links:[],rel:["FER-11"]},
  {id:"T11",t:"Statistical Test Design",co:"ARG",per:"2021\u201322",top:1,star:1,tags:["Statistics","AV/Safety","Optimization","R&D","Patent"],tech:"Python, SciPy \xb7 Wilson score, binomial CI, DoE, stratified sampling, Plackett-Burman, Gaussian processes",sum:"Statistical framework for proving AV safety at deployment scale. Binomial confidence intervals (Wilson score) for p\u22480. Fleet encounter probability. Hypothesis testing. Design of Experiments \u2014 stratified sampling, factorial design, Plackett-Burman for screening.",full:"Recognized vanilla binomial CI inapplicable to full ODD. Read extensively about testing safety-critical systems \u2014 nuclear reactors, aviation, medical devices. Bridge between dev and systems engineering. Invited to US for safety testing plan.",links:[{l:"Patent",u:"https://patents.google.com/patent/US20230030474A1/en"}],rel:["AID-28"]},
  {id:"T12",t:"Scenario Generation Framework",co:"ARG",per:"2021\u201322",tags:["Simulation","AV/Safety","Optimization","Patent"],tech:"Python \xb7 Variable-dimension scenario spaces, parameter fuzzing analysis, coverage optimization",sum:"Mathematical framework: scenarios as variable dimensions expanding with actors. Found significant % of millions of scenarios not providing value. Patent for responsive scenario generation.",links:[{l:"Patent",u:"https://patents.google.com/patent/US20230030474A1/en"}],rel:["AID-27"]},
  {id:"T13",t:"Modeling Library (Noise Injection)",co:"ARG",per:"2021\u201322",top:1,tags:["Simulation","AV/Safety","DSP/Signals","Shipped"],tech:"C++, Python \xb7 Component I/O analysis, realistic noise models from real-world data",sum:"Modeling library analyzing every component\u2019s inputs/outputs. Realistic noise injection. Significant % of previously-passing tests started correctly failing. Delivered under pressure with granular Excel tracker.",links:[],rel:["AID-23","AID-24","AID-25"]},
  {id:"T14",t:"VTT Simulation Platform",co:"AID",per:"2018\u201322",top:1,star:1,tags:["Simulation","AV/Safety","Architecture","Shipped"],tech:"C++, Python \xb7 Multi-layer ES+TF, discrete-event scheduling, IDM/Wiedemann, bicycle model, MPC/QP",sum:"Multi-layer sim framework: Layer 0 ground truth, subsequent layers apply noise/filtering. 8-dimension AV compute timing model. Driver models (Wiedemann, IDM). Vehicle dynamics (bicycle model). Path refinement (QP/CVXGEN). Deterministic discrete-event scheduling.",full:"Discovered how AV sim differs from gaming and traffic sim. Gaming = visual fidelity; traffic = aggregate flow. AV needs behavioral realism, sensor sim, deterministic replay, coverage analysis. Grew 2-person team to 4 teams, 20 engineers.",links:[],rel:["AID-4","AID-2"]},
  {id:"T15",t:"daisy Traffic Simulator",co:"IND",per:"2018\u201320",tags:["Simulation","AV/Safety","OSS","Side Project"],tech:"Python \xb7 Agent-based simulation, traffic flow modeling",sum:"Minimal open-source traffic simulator. Agent-based simulation for prototyping traffic flow ideas. Ideas incorporated into the main AID product.",links:[{l:"GitHub",u:"https://github.com/jadnohra/daisy"},{l:"Video",u:"https://youtu.be/-PC-AbEbrsE"}]},
  {id:"T16",t:"PaCoS Concurrency Simulator",co:"IND",per:"2018\u201320",tags:["Simulation","Concurrency","OSS","Side Project"],tech:"Python \xb7 Deterministic discrete-event simulation, reproducible scheduling",sum:"Deterministic concurrency simulator for debugging distributed systems. Reproducible behavior in parallel AV stacks. Used for architecture decisions on distributed systems.",links:[{l:"GitHub",u:"https://github.com/jadnohra/PaCoS"}]},
  {id:"T17",t:"Physics-2014 Contact Solver",co:"HVK",per:"~2014",top:1,star:1,tags:["Physics","Optimization","Numerical Analysis","Shipped"],tech:"C++, SIMD \xb7 Gauss-Seidel, sequential impulse, branch prediction opt, data rearrangement, >10 macro paths",sum:"Complete rewrite of Havok\u2019s contact constraint solver \u2014 shipped in all games since ~2014. Research (Agner\u2019s manuals) revealed branch prediction as key. Coupling geometry processing to solver using data rearrangement. No bugs ever reported. Tunable per-platform. Deterministic multi-core scaling.",links:[]},
  {id:"T18",t:"HKDS High-Fidelity Solver",co:"HVK",per:"~2016",top:1,tags:["Physics","Optimization","Numerical Analysis","R&D"],tech:"C++, Julia \xb7 MLCP solver, substepping, co-simulation, constraint stabilization",sum:"R&D for high-fidelity constraint solver: robotics and machinery simulation beyond game physics. Built on constraint stabilization work, \u2018universal constraint\u2019, substepping algorithm. Prototyped MLCP solver in Julia.",links:[{l:"Overview",u:"https://github.com/jadnohra/projects-pre-2015/blob/master/hkds/ds_overview1.pdf"},{l:"Detail",u:"https://github.com/jadnohra/projects-pre-2015/blob/master/hkds/ds_detail.pdf"}]},
  {id:"T19",t:"TOI Argument (Impossibility Proof)",co:"HVK",per:"~2016",top:1,tags:["Physics","Collision/Geometry","Formal Methods","R&D"],tech:"Mathematical proof \xb7 Continuous collision detection, tunneling analysis",sum:"Formal proof that the Time-Of-Impact tunneling problem has no complete solution. Open problem since \u2018TOI\u2019 engine abandoned. Multiple prior attempts replaced artifacts with other artifacts. Proved unsolvability \u2192 team stopped searching, focused on trade-offs.",links:[{l:"Proof",u:"https://github.com/jadnohra/projects-pre-2015/blob/master/hvk_other/toiarg1.pdf"}]},
  {id:"T20",t:"HoloLens Spatial Localization",co:"HVK",per:"~2015\u201317",tags:["AR/MR","Physics","Architecture","Patent"],tech:"C++ \xb7 Walk graph, spatial anchors, loop closure, IMU, occupancy grids, mesh deformation",sum:"HoloLens mixed reality R&D. Spatial Frame of Reference: walk graph with anchor nodes, coordinate baking, hologram placement. Physics-based localization: loop closure, jitter compensation. Occupancy grid segmentation.",links:[{l:"Patent",u:"https://patents.google.com/patent/US10672159B2/en"}]},
  {id:"T21",t:"Network Physics R&D",co:"HVK",per:"~2015",tags:["Physics","Networking","Concurrency","R&D"],tech:"C++ \xb7 Client-server physics, state sync, sector partitioning, prediction/rollback",sum:"Networked multiplayer physics: synchronization, prediction, and rollback for distributed rigid body simulation. Research report and proposed designs with prototype.",links:[{l:"Report",u:"https://github.com/jadnohra/projects-pre-2015/blob/master/netw/csarch1.pdf"}]},
  {id:"T22",t:"Geometry Numerical Issues",co:"HVK",per:"~2013\u201315",tags:["Physics","Numerical Analysis","Collision/Geometry","R&D"],tech:"C++ \xb7 IEEE 754, interval arithmetic, ULP analysis, ray-triangle/ray-sphere robustness",sum:"Deep investigation of floating-point issues in collision geometry. Ray-sphere improved by intuitive solution. Ray-triangle by analytical solution (Strebenz). Interval math library with pessimistic fast bounds (2x slower). First numerical analysis for dynamics (residuals).",links:[{l:"Analysis",u:"https://github.com/jadnohra/projects-pre-2015/blob/master/geom_num/JiraEpsilon.pdf"}]},
  {id:"T23",t:"WiiU Math Library",co:"HVK",per:"~2012",tags:["Physics","Numerical Analysis","Shipped"],tech:"C++, PowerPC asm \xb7 Instruction-level SIMD (handicapped 2-float), buggy compiler workarounds",sum:"Low-level math library optimization for Nintendo WiiU\u2019s PowerPC CPU. Instruction-level ARM with handicapped two-float SIMD. Working around buggy compiler performance optimizations.",links:[]},
  {id:"T24",t:"Job Queue Timing Fuzzer",co:"HVK",per:"~2014",tags:["Concurrency","Tools/Infra","R&D"],tech:"C++ \xb7 Timing fuzzing, race condition detection, automated instrumentation",sum:"Automated race condition debugging for hard-to-reproduce threading bugs (1/100000 repro). Timing fuzzing via instrumentation \u2014 different threads slowed differently. Found bug after some hours. Repro then easy to debug.",links:[]},
  {id:"T25",t:"Killzone 3 AI Systems",co:"GUE",per:"2009\u201311",tags:["Game AI","Physics","Shipped"],tech:"C++, PS3/SPU \xb7 Behavior trees, environment queries, physical animation, SPU multithreading/DMA",sum:"Environment-aware AI for Killzone 3 \u2014 jetpack navigation, owl patrol AI, environment interaction. SPU + PS3 multithreading/DMA tricky bug chasing.",links:[{l:"Video",u:"https://www.youtube.com/watch?v=_mXYAPUIAqg"}]},
  {id:"T26",t:"Killzone 3 Vehicle AI",co:"GUE",per:"2009\u201311",tags:["Game AI","Optimization","Shipped"],tech:"C++ \xb7 Motion planning, vehicle dynamics, path following, A*",sum:"Vehicle pathfinding and motion planning for AI-controlled vehicles in Killzone 3.",links:[{l:"Video",u:"https://www.youtube.com/watch?v=QjmRA2Obu9I"}]},
  {id:"T27",t:"Automatic Region Generation",co:"GUE",per:"2009\u201311",tags:["Game AI","Collision/Geometry","Shipped"],tech:"C++ \xb7 Skeletonization, medial axis transform, navmesh decomposition, Recast improvements",sum:"Automated navmesh region generation. Improvements on corner cases other companies presented as GDC challenges. Ported and improved Recast\u2019s code. Researched skeletonization algorithms.",links:[]},
  {id:"T28",t:"AI Sandbox",co:"AGD",per:"2008\u201310",tags:["Game AI","ML/RL","Collision/Geometry","OSS"],tech:"C++ \xb7 HPA*, locomotion system, reinforcement learning, parallel pathfinding",sum:"Open-source game AI framework. Main programmer for platform used by AI game dev community. Co-authored \u2018Parallel Pathfinding on Modern Hardware.\u2019",links:[]},
  {id:"T29",t:"World-Of-Football Engine",co:"KIM",per:"2006\u201308",tags:["Graphics","Physics","Game AI","ML/RL","Shipped"],tech:"C++, DirectX \xb7 Custom physics, neural net goalkeeper AI, spatial partitioning, scripting (Squirrel)",sum:"Complete indie game engine: rendering, physics, animation, neural network goalkeeper AI, collision, scripting, scene graph, audio. Full engine from scratch.",links:[{l:"GitHub",u:"https://github.com/jadnohra/World-Of-Football"},{l:"Videos",u:"https://www.youtube.com/watch?v=lDNY4-mupf0&list=PL5ED86276C6DB1347"}]},
  {id:"T30",t:"arxiv: Uniqueness of Minima",co:"GK",per:"2015",tags:["Optimization","Linear Algebra","Publication"],tech:"Python \xb7 Least squares, optimization theory, uniqueness proofs, IMU sensor fusion",sum:"Published paper proving uniqueness conditions for certain least squares problems \u2014 theoretical foundations for IMU sensor fusion optimization.",links:[{l:"arXiv",u:"https://arxiv.org/pdf/1605.08221.pdf"}]},
  {id:"S09",t:"defdefqed FOL Prover",co:"IND",per:"2017",tags:["Formal Methods","Compilers","Side Project"],tech:"Python \xb7 First-order logic, resolution, unification, semantic graph crawling",sum:"First-order logic theorem prover and semantic graph crawler. Formalize mathematical exploration and automatically extract relationships from texts.",links:[{l:"GitHub",u:"https://github.com/jadnohra/defdefqed"},{l:"Video",u:"https://www.youtube.com/watch?v=766N2wSXbbc"}]},
  {id:"S10",t:"Bigfoot Animation System",co:"IND",per:"2010",tags:["Animation","Physics","Collision/Geometry","Side Project"],tech:"C++, OpenGL, GLM \xb7 BVH mocap, skeleton retargeting, footplant detection, physics locomotion, quaternion math",sum:"Skeleton retargeting and motion planning system. Mocap loader, skeleton semantics, footplant detection. Physics-based locomotion. Built on Puppeteer/Bigeye UI frameworks.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/Bigfoot"},{l:"Video",u:"https://www.youtube.com/watch?v=SEntMI6s6RQ"}]},
  {id:"S11",t:"Bigeye UI Framework",co:"IND",per:"2010",tags:["Graphics","Architecture","Side Project"],tech:"C++, OpenGL, MagickWand, Win32 \xb7 Retained-mode rendering, scene graph",sum:"Lightweight retained-mode UI framework with scene graph rendering. Built for rapid prototyping of graphics and simulation tools. Used throughout career.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/Bigeye"}]},
  {id:"S12",t:"Puppeteer BVH Viewer",co:"IND",per:"2010",tags:["Animation","Graphics","Side Project"],tech:"C++, OpenGL, GLM \xb7 BVH parsing, skeletal rendering",sum:"BVH file loader and skeletal animation viewer. Foundation for Bigfoot animation research and motion capture visualization.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/Puppeteer"}]},
  {id:"S13",t:"BlenderToBVH Export",co:"IND",per:"2010",tags:["Animation","Tools/Infra","Side Project"],tech:"Python, Blender API \xb7 Armature traversal, coordinate system conversion",sum:"Blender addon to export armature animations to BVH format. Used in Bigfoot animation pipeline.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/BlenderToBVH"}]},
  {id:"S14",t:"RecastMOD Navmesh",co:"IND",per:"2010",tags:["Game AI","Collision/Geometry","Side Project"],tech:"C++, OpenGL \xb7 Voxelization, navigation mesh, A*, Recast & Detour",sum:"Modified Recast & Detour \u2014 industry-standard navmesh library. Used for AI pathfinding through voxelization and mesh generation. Foundation for Guerrilla\u2019s region generation work.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/AI/RecastMOD"}]},
  {id:"S15",t:"Obstacle Avoidance",co:"IND",per:"2009",tags:["Game AI","Collision/Geometry","Side Project"],tech:"C++, 2D viz \xb7 Velocity obstacles, collision prediction, steering behaviors",sum:"Velocity obstacles and steering behaviors \u2014 local collision avoidance for crowds and NPC navigation.",links:[{l:"Video",u:"https://www.youtube.com/watch?v=RZHIchPK1TE"}]},
  {id:"S16",t:"TicTacToe AI Testbed",co:"IND",per:"2009",tags:["Game AI","ML/RL","Side Project"],tech:"C++ \xb7 Minimax, alpha-beta pruning, value iteration (RL)",sum:"Classic game AI algorithms as learning exercise. Minimax, alpha-beta, and reinforcement learning on simple domain. RL contribution fed into AI Sandbox.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/AI/TicTacToe"}]},
  {id:"S17",t:"Graphics Framework (Q3 BSP)",co:"IND",per:"2009",tags:["Graphics","Collision/Geometry","Side Project"],tech:"C#, OpenGL \xb7 BSP traversal, PVS culling, lightmaps, Quake 3 maps",sum:"BSP-based renderer loading Quake 3 maps. Spatial partitioning, PVS culling, real-time rendering. Built on thrashit3d from university.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/Graphics/Framework1"}]},
  {id:"S18",t:"MLCP 2.0 (Julia LP Solver)",co:"IND",per:"2015",tags:["Physics","Optimization","Linear Algebra","Side Project"],tech:"Julia, GLPK \xb7 Linear programming, LU decomposition, MLCP",sum:"Linear programming and LU decomposition implementation. Exploring numerical methods for constraint solving that underpin physics engines. Used for HKDS research and arXiv validation.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/Lab2015/mlcp2.0"}]},
  {id:"S19",t:"hinges_py RBD Simulator",co:"IND",per:"2015",tags:["Physics","Optimization","Side Project"],tech:"Python \xb7 Rigid body dynamics, constraint solving, forward Euler",sum:"Python RBD simulator for research. Exploring constraint formulations and numerical methods outside Havok codebase. Used for HKDS research and arXiv validation.",links:[{l:"GitHub",u:"https://github.com/jadnohra/hinges_py"}]},
  {id:"S20",t:"trace (Real-Time Plotting)",co:"IND",per:"2015",tags:["Tools/Infra","Physics","Side Project"],tech:"Python \xb7 Streaming data visualization, solver convergence plotting",sum:"Real-time data visualization tool for physics debugging. Plotting solver convergence, constraint forces, and numerical residuals. Used at Havok for dynamics debugging.",links:[{l:"GitHub",u:"https://github.com/jadnohra/trace"}]},
  {id:"S21",t:"asinus_salutem (Math Parser)",co:"IND",per:"2015",tags:["Formal Methods","Tools/Infra","Side Project"],tech:"Python, SymPy \xb7 Expression parsing, AST construction, symbolic computation",sum:"Interactive math expression parser with symbolic computation. CLI tool for quick mathematical exploration and verification.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/blob/master/Labs/Lab2015/asinus_salutem/as.py"}]},
  {id:"S22",t:"tag_export (Library Index)",co:"IND",per:"2017",tags:["Tools/Infra","Side Project"],tech:"Python \xb7 Curated bibliography, tagging system",sum:"Curated, tagged bibliography of technical books and papers. Quick lookup during study sessions and project research.",links:[{l:"GitHub",u:"https://github.com/jadnohra/tag_export"}]},
  {id:"S23",t:"Floating Point Analysis",co:"IND",per:"2011",tags:["Numerical Analysis","Physics","Side Project"],tech:"Python, C++ \xb7 IEEE 754 bit manipulation, epsilon calculation, denormals",sum:"Low-level IEEE 754 exploration. Bit manipulation, epsilon calculation, denormal handling. Foundation for all numerical stability work at Havok.",links:[{l:"GitHub",u:"https://github.com/jadnohra/projects-pre-2015/tree/master/Labs/LabsMore/fp"}]},
  {id:"L01",t:"77-neurons Mathematical Foundations",co:"IND",per:"2011\u201312",tags:["Linear Algebra","Optimization","Study"],tech:"Calculus, proofs, linear algebra \xb7 Weekly exercises with study partners",sum:"Year-long structured self-study. Calculus Lifesaver (Banner), Book of Proof (Hammack), Linear Algebra (Hefferon). Weekly exercises and discussions.",links:[{l:"GitHub",u:"https://github.com/jadnohra/77-neurons-project-perelman"}]},
  {id:"L02",t:"Study: Mathematics & Physics History",co:"IND",per:"2013\u201314",tags:["Formal Methods","Linear Algebra","Study"],tech:"LCP, GJK, eigenvalue decomposition \xb7 Euler, Euclid, Jammer, Morris Kline, number theory",sum:"Intensive self-study: historical and philosophical foundations of mathematics and physics through primary sources. LCP and GJK algorithm studies. Eigenvalue problems (Parlett). Set theory (Zakon). Barwise on truth and circularity.",links:[{l:"Euler notes",u:"https://github.com/jadnohra/TheNotes/blob/master/2013-2014%20/Notes%20on%20Euler's%20Writings.pdf"},{l:"LCP notes",u:"https://github.com/jadnohra/TheNotes/blob/master/2013-2014%20/Notes%20on%20the%20Linear%20Complementarity%20Problem.pdf"}]},
  {id:"L03",t:"Study: Foundations & Logic",co:"IND",per:"2015",tags:["Formal Methods","Study"],tech:"Set theory, model theory, proof theory \xb7 Potter, G\u00f6del, Hestenes geometric algebra",sum:"Mathematical foundations: set theory, logic, philosophical underpinnings. Potter\u2019s Set Theory, G\u00f6del\u2019s incompleteness, Hestenes geometric algebra for physics.",links:[{l:"Notes",u:"https://github.com/jadnohra/TheNotes/blob/master/2015/Notes%20on%20Potter's%20Set%20Theory%20and%20its%20Philosophy.pdf"}]},
  {id:"L04",t:"Study: Analysis & Geometry",co:"IND",per:"2016",tags:["Optimization","Numerical Analysis","Study"],tech:"Differential forms, manifolds, measure theory, calculus of variations, real analysis",sum:"Rigorous differential geometry and real analysis \u2014 framework underlying physics simulation, manifolds, continuous optimization. Applied at Havok for solver formalization.",links:[{l:"Notes",u:"https://github.com/jadnohra/TheNotes/blob/master/2016/dform.pdf"}]},
  {id:"L05",t:"Study: Rigid Body Dynamics",co:"IND",per:"2017",tags:["Physics","Optimization","Formal Methods","Study"],tech:"Lagrangian mechanics, constraint solving, variational methods",sum:"Formal treatment of RBD after years at Havok. Connecting practical simulation to mathematical foundations in mechanics and constraint solving.",links:[{l:"Notes",u:"https://github.com/jadnohra/TheNotes/blob/master/2017/treat_rbd_1.pdf"}]},
  {id:"L06",t:"Study: Programming Logic",co:"IND",per:"2017",tags:["Formal Methods","Compilers","Study"],tech:"Lambda calculus, type theory \xb7 Programming language foundations",sum:"Deep dive into theoretical foundations of programming languages. Type theory, lambda calculus, and connections to logic.",links:[{l:"Notes",u:"https://github.com/jadnohra/TheNotes/blob/master/2017/plql.pdf"}]},
  {id:"L07",t:"TheNotes Collection",co:"IND",per:"2013\u201322",tags:["Formal Methods","Linear Algebra","Study"],tech:"90+ documents \xb7 Physics, linear algebra, geometry, logic, analysis, differential forms",sum:"10 years of mathematical study notes. Physics foundations, linear algebra, analysis, formal logic, differential geometry. Documenting the theoretical foundation behind all technical work.",links:[{l:"GitHub",u:"https://github.com/jadnohra/TheNotes"}]},
  {id:"T38",t:"University Projects (AUB)",co:"AUB",per:"1998",tags:["Graphics","Collision/Geometry","Shipped"],tech:"C++, Java, DirectX \xb7 Software rasterizer, ray tracer+BVH, octree, height-map wave sim, 2D physics engine",sum:"thrashit3d (software 3D renderer), RayTracer (BVH, Blinn-Phong, parallel rendering), xu1 (racing engine with octree), watereffect (Java wave sim), 2dshooter (Java engine with physics), GraphEdit (3D equation grapher with distributed rendering). Foundation for entire career.",links:[{l:"GitHub",u:"https://github.com/jadnohra/jadnohra.com/tree/main/repos/ancient-1998"}]},
];

const SYSTEMS_ARC=[
  {name:"Build",period:"1998\u20132008",color:"#94a3b8",short:"Implement from scratch. Ray tracers, game engines, AI. Each project self-contained. Learning to make things work.",stories:["T38","T29","T28"]},
  {name:"Integrate",period:"2009\u20132011",color:"#60a5fa",short:"Code must work with others\u2019 code. Killzone 3: AI with animation, physics, level design. First experience of systems constraints.",stories:["T25","T26","T27"]},
  {name:"Harden",period:"2011\u20132016",color:"#34d399",short:"Code runs everywhere. Every platform, every edge case. Numerical correctness matters. Performance non-negotiable. Proving unsolvability IS a solution.",stories:["T17","T22","T23","T19","T24"]},
  {name:"Formalize",period:"2011\u20132017",color:"#a78bfa",short:"Build mathematical foundations. Study analysis, RBD, logic, proofs. Understand WHY things work. Published research. Theory reveals patterns across domains.",stories:["L01","L04","L05","T30","L03"]},
  {name:"Architect",period:"2018\u20132020",color:"#f97316",short:"Design the structure. Multi-layer simulation architecture. Not one component but how all components relate. Traffic + viz + runtime + scenario eval.",stories:["T14","T15","T16"]},
  {name:"Validate",period:"2021\u20132022",color:"#f472b6",short:"Prove system properties. Statistical test design for AV safety. How do you PROVE a vehicle is safe? Reading nuclear, aviation, medical testing. Bridge dev \u2194 systems engineering.",stories:["T11","T12","T13"]},
  {name:"Co-Design",period:"2023\u20132025",color:"#ef4444",short:"Design across domain boundaries. Crypto \u2194 hardware. Safety perception \u2194 certification. Simulation as bridge between domains that don\u2019t naturally talk.",stories:["T01","T02","T06","T08"]},
];

const MINOR=new Set(["S03","S04","S05","S07","S12","S13","S15","S16","S21","S22"]);
const NOTABLE=new Set(["S01","S02","S06","S08","S09","S10","S11","S14","S17","S18","S19","S20","S23","T15","T16","L01","L02","L03","L04","L05","L06","L07"]);
S.forEach(s=>{if(MINOR.has(s.id))s.scale="minor";else if(NOTABLE.has(s.id))s.scale="notable";else s.scale="major"});

const tagCounts={};S.forEach(s=>s.tags.forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1}));
const catTagsMap={};Object.entries(TAGS).forEach(([n,c])=>{if(!catTagsMap[c.cat])catTagsMap[c.cat]=[];catTagsMap[c.cat].push(n)});
const storyMap={};S.forEach(s=>{storyMap[s.id]=s});

let sel=new Set(),selCo=null,selEra=null,topOnly=false,starOnly=false,search='',expanded=null,rawMode=false,galMode=false;
let scaleOn={major:false,notable:false,minor:false};
let collapsed={domain:false,technique:true,type:true,era:true};
const CROSS_DOMAIN=[
  {name:"Simulation as Verification",color:"#f59e0b",short:"Build a cheaper version to find bugs in the real thing. Same pattern across four domains.",chain:[{id:"T18",note:"Julia MLCP prototype catches solver issues before C++ impl"},{id:"T16",note:"PaCoS: deterministic replay finds race conditions"},{id:"T14",note:"AV sim: multi-layer noise injection catches failures real testing misses"},{id:"T01",note:"ZK three-mode: sim vs verilated finds impl bugs, verilated vs HW finds HW bugs"}]},
  {name:"Proving Impossibility",color:"#ef4444",short:"Knowing when something CAN\u2019T be solved completely is as valuable as solving it.",chain:[{id:"T19",note:"TOI argument: tunneling has no complete solution \u2192 stop searching, choose trade-offs"},{id:"T11",note:"Vanilla binomial CI inapplicable to full ODD \u2192 need DoE, not brute-force testing"},{id:"T08",note:"Safety case: provable output statements \u2192 bound what you CAN prove"}]},
  {name:"Optimization Under Hardware Constraints",color:"#ec4899",short:"Same fight on different chips. Mental models of CPUs, compilers, and instruction sets carry across decades.",chain:[{id:"T23",note:"WiiU: handicapped SIMD, buggy compiler \u2192 instruction-level workarounds"},{id:"T17",note:"Contact solver: branch prediction as key actor \u2192 data rearrangement"},{id:"T02",note:"FPGA VLIW: register bank coloring, instruction scheduling \u2014 same constraint problem"},{id:"T07",note:"Certifiable embedded: rewrite pipeline for resource-constrained HW"}]},
  {name:"Noise & Uncertainty Propagation",color:"#3b82f6",short:"How wrong can your numbers be? From floating-point bits to safety-critical uncertainty budgets.",chain:[{id:"S23",note:"IEEE 754 bit manipulation: where do errors come from?"},{id:"T22",note:"Geometry: interval arithmetic, ULP analysis for ray-triangle robustness"},{id:"T13",note:"AV noise injection: realistic sensor models \u2192 tests correctly fail"},{id:"T06",note:"HZM: uncertainty from LiDAR, weather, driver \u2192 expand perceived area"}]},
  {name:"Formal Methods \u2192 Practical Payoff",color:"#14b8a6",short:"Years of studying logic and proofs pay off when you build compilers or prove safety properties.",chain:[{id:"L03",note:"Set theory, G\u00f6del, proof theory \u2192 what formal systems can express"},{id:"S09",note:"FOL prover: resolution + unification \u2192 hands-on formal reasoning"},{id:"T02",note:"XLang compiler: instruction scheduling IS constraint satisfaction"},{id:"T08",note:"DFD safety case: provable statements about code \u2192 T\u00dcV S\u00dcD certification"}]},
];
let arcOpen=false;let hoverTimeout=null;

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function filter(){
  const byCat={};
  sel.forEach(t=>{const cat=TAGS[t]?.cat;if(cat){if(!byCat[cat])byCat[cat]=[];byCat[cat].push(t)}});
  return S.filter(s=>{
    if(selCo&&s.co!==selCo)return false;
    if(selEra){const y=perToYear(s.per);const era=ERAS.find(e=>e.id===selEra);if(era&&(y<era.from||y>era.to))return false}
    const anyScale=scaleOn.major||scaleOn.notable||scaleOn.minor;
    if(anyScale&&!scaleOn[s.scale])return false;
    if(topOnly&&!s.top)return false;
    if(starOnly&&!s.star)return false;
    for(const[,tags]of Object.entries(byCat)){if(!tags.some(t=>s.tags.includes(t)))return false}
    if(search){const l=search.toLowerCase();return s.t.toLowerCase().includes(l)||s.tech.toLowerCase().includes(l)||s.sum.toLowerCase().includes(l)||s.id.toLowerCase().includes(l)||(s.full&&s.full.toLowerCase().includes(l))}
    return true;
  });
}

function cardH(s){
  const open=expanded===s.id;
  let h='<div class="card '+(open?'open':'')+'" id="card-'+s.id+'" onmouseenter="showPop(event,\''+s.id+'\')" onmouseleave="hidePop()">';
  h+='<div class="card-head" onclick="expanded=expanded===\''+s.id+'\'?null:\''+s.id+'\';hidePop();render()">';
  h+='<span class="card-co" style="color:'+CO[s.co].c+'">'+s.co+'</span>';
  h+='<span class="card-id">'+s.id+'</span>';
  h+='<span class="card-title">'+(s.star?icon('star','i11')+' ':'')+esc(s.t)+'</span>';
  h+='<div class="card-icons">';
  if(galMode){const m=getMedia(s);if(m.vids.length)h+='<span style="color:#ef4444">'+icon('play','i')+'</span>';if(m.sites.length)h+='<span style="color:#3b82f6">'+icon('link','i')+'</span>'}
  let ic=0;for(const tg of s.tags){if(ic>=3)break;const cfg=TAGS[tg];if(cfg&&cfg.icon){h+='<span style="color:'+(sel.has(tg)?cfg.color:'#94a3b8')+'">'+icon(cfg.icon,'i')+'</span>';ic++}}
  h+='</div>';
  if(s.per)h+='<span class="card-period">'+s.per+'</span>';
  h+=(open?icon('chevDown','i14'):icon('chevRight','i14'));
  h+='</div>';
  if(open){
    h+='<div class="card-body">';
    h+='<div class="tech-line">'+esc(s.tech)+'</div>';
    h+='<p>'+esc(s.sum)+'</p>';
    if(rawMode&&s.full)h+='<p>'+esc(s.full)+'</p>';
    if(rawMode&&!s.full)h+='<p class="no-full">No extended detail available</p>';
    if(s.links&&s.links.length){
      h+='<div class="card-links">';
      for(const lk of s.links)h+='<a class="card-link" href="'+esc(lk.u)+'" target="_blank" rel="noopener">'+icon('link','i9')+' '+esc(lk.l)+'</a>';
      h+='</div>';
    }
    if(s.rel&&s.rel.length){
      h+='<div class="card-rel">'+icon('users','i9')+' Leadership context: ';
      h+=s.rel.map(r=>'<span>'+r+'</span>').join(' ');
      h+='</div>';
    }
    for(const cat of['domain','technique','type']){
      const matching=s.tags.filter(t=>TAGS[t]?.cat===cat);
      if(!matching.length)continue;
      h+='<div class="tag-row">';
      h+='<span class="cat-label">'+CATS[cat].label.split(' ')[0]+'</span>';
      for(const tg of matching){
        const cfg=TAGS[tg];const ac2=sel.has(tg);const ic2=cfg.icon?icon(cfg.icon,'i9'):'';
        h+='<span class="mini-tag '+(ac2?'active':'')+'" style="--ac:'+cfg.color+';--ac-bg:'+cfg.color+'22;'+(ac2?'color:'+cfg.color+';background:'+cfg.color+'22':'')+'" onclick="event.stopPropagation();toggleTag(\''+esc(tg).replace(/'/g,"\\'")+'\')">'+ic2+' '+esc(tg)+'</span>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function render(){
  const f=filter();
  const anyScale=scaleOn.major||scaleOn.notable||scaleOn.minor;
  const hasFilter=sel.size||selCo||selEra||topOnly||starOnly||anyScale||search;
  const activeCats={};sel.forEach(t=>{const c=TAGS[t]?.cat;if(c)activeCats[c]=(activeCats[c]||0)+1});
  let h='';
  h+='<div class="header"><div><h1>Technical Explorer</h1><p class="sub">'+S.length+' projects \xb7 OR within category, AND between</p></div><div class="header-right">';
  h+='<button class="toggle-btn '+(rawMode?'on':'off')+'" onclick="rawMode=!rawMode;render()">'+(rawMode?icon('toggleOn','i14'):icon('toggleOff','i14'))+' '+(rawMode?'Full detail':'Tech stack')+'</button>';
  h+='<button class="toggle-btn '+(galMode?'on':'off')+'" onclick="galMode=!galMode;render()">'+(galMode?icon('toggleOn','i14'):icon('toggleOff','i14'))+' Gallery</button>';
  h+='<div class="search-wrap">'+icon('search')+'<input value="'+esc(search)+'" oninput="search=this.value;render()" placeholder="Search..."></div></div></div>';

  h+='<div class="row">';
  for(const[k,v]of Object.entries(CO)){
    const ac=selCo===k;
    h+='<button class="pill '+(ac?'active':'')+'" style="--ac:'+v.c+'" onclick="selCo=selCo===\''+k+'\'?null:\''+k+'\';render()"><span class="co-name">'+v.n+'</span><span class="co-period">'+v.p+'</span></button>';
  }
  h+='</div><div class="row">';
  h+='<button class="pill '+(topOnly?'active':'')+'" style="--ac:#fbbf24" onclick="topOnly=!topOnly;render()">'+icon('star','i')+' Top Projects</button>';
  h+='<button class="pill '+(starOnly?'active':'')+'" style="--ac:#fbbf24" onclick="starOnly=!starOnly;render()">'+icon('star','i')+' Starred</button>';
  h+='<span style="color:#cbd5e1;font-size:11px;margin:0 2px">\u2502</span>';
  h+='<button class="pill '+(scaleOn.major?'active':'')+'" style="--ac:#f97316" onclick="scaleOn.major=!scaleOn.major;render()">'+icon('rocket','i')+' Major</button>';
  h+='<button class="pill '+(scaleOn.notable?'active':'')+'" style="--ac:#3b82f6" onclick="scaleOn.notable=!scaleOn.notable;render()">'+icon('bulb','i')+' Notable</button>';
  h+='<button class="pill '+(scaleOn.minor?'active':'')+'" style="--ac:#94a3b8" onclick="scaleOn.minor=!scaleOn.minor;render()">'+icon('terminal','i')+' Minor</button>';
  if(hasFilter)h+='<button class="clear-btn" onclick="sel.clear();selCo=null;selEra=null;topOnly=false;starOnly=false;scaleOn={major:false,notable:false,minor:false};search=\'\';render()">'+icon('x','i')+' Clear</button>';
  h+='</div>';

  for(const[ck,cc]of Object.entries(CATS)){
    const tags=catTagsMap[ck]||[];const isC=collapsed[ck];const ac=activeCats[ck]||0;
    h+='<div><button class="cat-header" onclick="collapsed[\''+ck+'\']=!collapsed[\''+ck+'\'];render()">'+(isC?icon('chevRight','i'):icon('chevDown','i'))+' '+cc.label+(ac?' <span class="ac-count">('+ac+')</span>':'')+' <span class="desc">\u2014 '+cc.desc+'</span></button>';
    if(!isC){
      h+='<div class="cat-tags">';
      for(const name of tags){
        const cfg=TAGS[name];const ac2=sel.has(name);const ic=cfg.icon?icon(cfg.icon,'i'):'';
        h+='<button class="pill '+(ac2?'active':'')+'" style="--ac:'+cfg.color+'" onclick="toggleTag(\''+esc(name).replace(/'/g,"\\'")+'\')">'+ic+' '+esc(name)+' <span class="cnt">'+(tagCounts[name]||0)+'</span></button>';
      }
      h+='</div>';
    }
    h+='</div>';
  }

  const eraC=collapsed['era'];
  h+='<div><button class="cat-header" onclick="collapsed[\'era\']=!collapsed[\'era\'];render()">'+(eraC?icon('chevRight','i'):icon('chevDown','i'))+' Era'+(selEra?' <span class="ac-count">(1)</span>':'')+' <span class="desc">\u2014 Time period</span></button>';
  if(!eraC){
    h+='<div class="cat-tags">';
    for(const era of ERAS){
      const ac=selEra===era.id;
      const cnt=S.filter(s=>{const y=perToYear(s.per);return y>=era.from&&y<=era.to}).length;
      h+='<button class="pill '+(ac?'active':'')+'" style="--ac:'+era.c+'" onclick="selEra=selEra===\''+era.id+'\'?null:\''+era.id+'\';render()">'+era.label+' <span class="cnt">'+cnt+'</span></button>';
    }
    h+='</div>';
  }
  h+='</div>';

  h+='<div class="filter-row"><p class="count">'+f.length+' matching</p>';
  if(sel.size){
    h+='<div class="active-tags">';
    sel.forEach(t=>{const cfg=TAGS[t];if(cfg)h+='<span class="active-tag" style="background:'+cfg.color+'22;color:'+cfg.color+'" onclick="toggleTag(\''+esc(t).replace(/'/g,"\\'")+'\')">'+esc(t)+' '+icon('x','i9')+'</span>'});
    h+='</div>';
  }
  h+='</div>';

  h+='<div class="cards">';
  for(const s of f) h+=cardH(s);
  if(!f.length)h+='<p class="empty">No projects match current filters</p>';
  h+='</div>';

  h+='<div class="arc">';
  h+='<button class="arc-header" onclick="arcOpen=!arcOpen;render()">'+(arcOpen?icon('chevDown','i16'):icon('chevRight','i16'))+' Cross-Domain Insights <span class="a-sub">\u2014 where domains connect</span></button>';
  if(arcOpen){
    h+='<div class="a-list">';
    CROSS_DOMAIN.forEach((a,i)=>{
      h+='<div class="a-card" style="--ac:'+a.color+'"><div class="a-head"><span class="a-num">'+(i+1)+'.</span><span class="a-name">'+esc(a.name)+'</span></div>';
      h+='<p class="a-short">'+esc(a.short)+'</p>';
      h+='<div class="a-chain">';
      a.chain.forEach((c,j)=>{
        const st=storyMap[c.id];
        if(!st)return;
        h+='<div class="chain-step">';
        if(j>0)h+='<span class="chain-arrow">\u2192</span>';
        h+='<span class="a-story-link" onclick="expanded=\''+c.id+'\';render();setTimeout(()=>document.getElementById(\'card-'+c.id+'\')?.scrollIntoView({behavior:\'smooth\',block:\'center\'}),50)">'+c.id+'</span>';
        h+='<span class="chain-note">'+esc(c.note)+'</span>';
        h+='</div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';

  document.getElementById('app').innerHTML=h;
}

function toggleTag(t){sel.has(t)?sel.delete(t):sel.add(t);render()}

const pop=document.createElement('div');pop.className='popover';document.body.appendChild(pop);
function showPop(e,id){
  if(expanded===id)return;
  const el=e.currentTarget;
  clearTimeout(hoverTimeout);
  hoverTimeout=setTimeout(()=>{
    const s=storyMap[id];if(!s||!el)return;
    const r=el.getBoundingClientRect();
    const w=Math.min(480,window.innerWidth-32);
    let left=r.left;if(left+w>window.innerWidth-16)left=window.innerWidth-16-w;if(left<16)left=16;
    let top=r.bottom+6;if(top+200>window.innerHeight)top=r.top-210;
    let tags='';
    let tc=0;for(const tg of s.tags){if(tc>=6)break;const cfg=TAGS[tg];if(cfg){tags+='<span class="pop-tag" style="background:'+cfg.color+'18;color:'+cfg.color+'">'+(cfg.icon?icon(cfg.icon,'i9'):'')+' '+esc(tg)+'</span>';tc++}}
    pop.innerHTML='<div class="pop-head"><span class="pop-co" style="color:'+CO[s.co].c+'">'+s.co+'</span><span class="pop-id">'+s.id+'</span><span class="pop-title">'+esc(s.t)+'</span></div>'+(rawMode?'<p class="pop-text">'+esc(s.sum)+'</p>':'<div class="pop-tech">'+esc(s.tech)+'</div>')+'<div class="pop-tags">'+tags+'</div>';
    pop.style.top=top+'px';pop.style.left=left+'px';pop.style.width=w+'px';
    pop.classList.add('visible');
  },200);
}
function hidePop(){clearTimeout(hoverTimeout);pop.classList.remove('visible')}

render();
</script>
